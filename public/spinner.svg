<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spinner {
      animation: spin 2s linear infinite;
      transform-origin: 50px 50px;
    }
  </style>
  <g class="spinner">
    <!-- Curved spiral line -->
    <path d="M 50 15 Q 75 15 75 40 Q 75 65 50 65 Q 30 65 30 50" 
          fill="none" 
          stroke="black" 
          stroke-width="8" 
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <!-- Arrow head -->
    <path d="M 35 35 L 20 25 L 28 42 Z" 
          fill="black" 
          stroke="black" 
          stroke-width="1" 
          stroke-linejoin="round"/>
  </g>
</svg>